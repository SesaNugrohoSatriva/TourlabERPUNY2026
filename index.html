<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Card - Tourlab ERP 2026</title>
    <link rel="stylesheet" href="style.css">
    </link>
</head>

<body>

    <header class="erp-header">
        <div class="erp-logo-container">
            <img src="assets/Logo UNY.png" alt="Logo UNY" class="erp-logo-img">
            <img src="assets/Logo Teknik Industri UNY.png" alt="Logo Teknik Industri UNY" class="erp-logo-img">
            <img src="assets/Logo ERP.jpeg" alt="Logo Lab ERP UNY" class="erp-logo-img">
        </div>

        <div class="erp-header-title">
            <div class="erp-main-title">
                LABORATORIUM <span class="erp-highlight">ERP</span>
            </div>
            <div class="erp-sub-title">
                TEKNIK INDUSTRI UNY
            </div>
        </div>
    </header>

    <main class="erp-main">
        <div class="erp-card">
            <div class="erp-card-banner">
                <div class="erp-photo-wrapper">
                    <div class="erp-photo-frame">
                        <img src="https://www.w3schools.com/howto/img_avatar.png" alt="Foto Peserta"
                            id="participantFoto" class="erp-photo-img">
                    </div>
                </div>
            </div>

            <div class="erp-card-content">
                <h2 class="erp-user-role">PESERTA TOURLAB</h2>
                <div class="erp-batch-badge">BATCH 2026</div>

                <div class="erp-info-container">
                    <div class="erp-info-group">
                        <label class="erp-info-label">Nama Lengkap</label>
                        <div class="erp-info-data" id="participantNama">[NAMA KAMU]</div>
                    </div>

                    <div class="erp-info-group">
                        <label class="erp-info-label">NIM</label>
                        <div class="erp-info-data" id="participantNim">[NIM KAMU]</div>
                    </div>

                    <div class="erp-info-group">
                        <label class="erp-info-label">Kelas</label>
                        <div class="erp-info-data erp-no-border" id="participantKelas">[KELAS KAMU]</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="erp-action">
            <button id="downloadPdfBtn" class="erp-download-btn">
                <span>⬇</span>
                Download PDF
            </button>
        </div>
    </main>

    <footer class="erp-footer">
        <p class="erp-footer-dev">
            Developed with ❤️ by <span class="erp-highlight" style="font-weight: 800;">Laboratorium ERP</span>
        </p>
        <p class="erp-footer-copy">
            Copyright &copy; 2026 Laboratorium ERP Teknik Industri UNY. All Rights Reserved.
        </p>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
